<body class="bg-paper-base text-primary min-h-screen flex flex-col items-center justify-center font-body-text antialiased p-margin-mobile md:p-margin-desktop">
<main class="w-full max-w-md mx-auto flex-grow flex flex-col justify-center items-center">
<!-- Login Card -->
<div class="bg-surface-white border border-border-tan w-full p-8 md:p-12 shadow-sm relative overflow-hidden">
<!-- Deco lines -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-primary"></div>
<div class="absolute top-0 left-0 w-[4px] h-full bg-archive-gold opacity-80"></div>
<div class="text-center mb-10">
<h1 class="font-masthead-logo text-masthead-logo text-primary mb-2 tracking-tighter">ACCESS TERMINAL</h1>
<p class="font-subheadline text-subheadline text-on-surface-variant uppercase tracking-widest text-sm">Sovereign Clearance Required</p>
<div class="mt-6 flex justify-center">
<span class="material-symbols-outlined text-4xl text-archive-gold" style="font-variation-settings: 'FILL' 0;">fingerprint</span>
</div>
</div>
<form class="space-y-6">
<!-- Field: Officer ID -->
<div>
<label class="block font-data-mono text-data-mono text-primary mb-2 uppercase tracking-wide flex justify-between items-end" for="officer-id">
<span>Officer ID</span>
<span class="text-[10px] text-on-surface-variant border border-border-tan px-1 bg-paper-base">REQ</span>
</label>
<input class="w-full bg-paper-base border border-border-tan text-primary font-data-mono text-data-mono p-3 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors placeholder-on-surface-variant/50" id="officer-id" name="officer-id" placeholder="e.g. O-1042-ALPHA" type="text"/>
</div>
<!-- Field: Biometric Hash -->
<div>
<label class="block font-data-mono text-data-mono text-primary mb-2 uppercase tracking-wide flex justify-between items-end" for="bio-hash">
<span>Biometric Hash</span>
<span class="text-[10px] text-on-surface-variant border border-border-tan px-1 bg-paper-base">SEC</span>
</label>
<div class="relative">
<input class="w-full bg-paper-base border border-border-tan text-primary font-data-mono text-data-mono p-3 pr-10 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors placeholder-on-surface-variant/50" id="bio-hash" name="bio-hash" placeholder="••••••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility_off</span>
</button>
</div>
</div>
<!-- Status Ticker (Fake) -->
<div class="bg-surface-container-high border border-border-tan p-2 mt-4 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-press-red animate-pulse"></span>
<span class="font-data-mono text-[10px] uppercase tracking-wider text-on-surface-variant">System Status: Encrypted Connection Established</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-tag text-label-tag uppercase tracking-widest py-4 mt-8 border-2 border-primary hover:bg-surface-white hover:text-primary transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
<span>Initiate Sequence</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Contextual Footer (Transactional/Login) -->
<footer class="mt-12 w-full max-w-md mx-auto text-center flex flex-col items-center gap-4">
<div class="w-16 h-[1px] bg-border-tan mb-2"></div>
<p class="font-caption text-caption text-on-surface-variant uppercase tracking-widest">© 2024 RECALL Permanent Archive. All Rights Reserved.</p>
<div class="flex gap-6 mt-2">
<a class="font-edition-number text-edition-number text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">Operational Security</a>
<a class="font-edition-number text-edition-number text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">Contact Command</a>
</div>
</footer>
